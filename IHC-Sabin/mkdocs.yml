site_name: Avaliação IHC — Sabin Diagnóstico e Saúde
site_description: Avaliação de acessibilidade e usabilidade do portal Sabin (Brasília-DF)
site_author: Equipe IHC 2026.1
site_url: https://ihc-sabin.github.io/

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/brightness-4
        name: Modo claro
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.integrate

plugins:
  - search:
      lang: pt
  - mermaid2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - tables
  - footnotes
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Início: index.md
  - Planejamento:
    - Visão Geral: planejamento/index.md
    - Equipe: planejamento/equipe.md
    - Cronograma: planejamento/cronograma.md
  - Avaliação de Acessibilidade:
    - Visão Geral: avaliacao-acessibilidade/index.md
    - Ferramentas e Plugins: avaliacao-acessibilidade/ferramentas.md
    - Checklist WCAG 2.1: avaliacao-acessibilidade/checklist-wcag.md
    - Relato dos Resultados: avaliacao-acessibilidade/resultados.md
  - Avaliação Heurística:
    - Método e Resultados: avaliacao-heuristica/index.md
  - Teste de Usabilidade:
    - Planejamento: teste-usabilidade/planejamento.md
    - Roteiro de Tarefas: teste-usabilidade/roteiro.md
    - Relato dos Resultados: teste-usabilidade/relato.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ihc-sabin
